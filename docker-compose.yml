version: '3.8'

services:
  # Ollama service (modelo rodando)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Training service (Python + unsloth)
  training:
    build: .
    container_name: llm-training
    volumes:
      - ./my-context:/app/my-context
      - ./models:/app/models
      - ./scripts:/app/scripts
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      - ollama
    # Uncomment to auto-train on startup
    # command: python3 train.py --context-dir my-context

  # API wrapper (Node.js)
  api:
    image: node:18-alpine
    container_name: llm-api
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      NODE_ENV: production
    command: npm install && npm start

volumes:
  ollama_data:
    driver: local

networks:
  default:
    name: llm-training-network
